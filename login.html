<!DOCTYPE html>
<html lang="en" dir="">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bug Finder | Login</title>
    <!-- Favicon link -->
    <link
      rel="shortcut icon"
      href="./assets/img/logo/favicon.svg"
      type="image/x-icon"
    />
    <!-- Fontawesome6 Css link -->
    <link rel="stylesheet" href="assets/css/all.min.css" />
    <!-- Bootstrap5 Css link -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <!-- Owl carousel Css link -->
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css" />
    <!-- select2 Css link -->
    <link rel="stylesheet" href="assets/css/select2.min.css" />
    <!-- nice-select Css link -->
    <link rel="stylesheet" href="assets/css/nice-select.css" />
    <!-- Style Css link -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- login-signup section start -->
    <div class="login-register-section">
      <div class="container">
        <div class="login-register-wrapper">
          <div
            class="login-register-section-inner bf_fade_anim"
            data-delay="0.3"
          >
            <div class="login-register-form">
              <form>
                <div class="section-header">
                  <a href="index.html" class="logo">
                    <img src="./assets/img/logo/logo.png" alt="logo" />
                  </a>
                  <h3>Login your Account</h3>
                </div>
                <div class="row g-4 justify-content-center">
                  <div class="col-auto">
                    <button type="button" class="social-btn">
                      <img
                        src="./assets/img/login-signup/google.png"
                        alt="google"
                      />
                    </button>
                  </div>
                  <div class="col-auto">
                    <button type="button" class="social-btn">
                      <img
                        src="./assets/img/login-signup/envato.png"
                        alt="envato"
                      />
                    </button>
                  </div>
                </div>
                <div class="divider">Or sign in with</div>
                <div class="row g-4">
                  <div class="col-12">
                    <input
                      type="email"
                      class="form-control two"
                      id="exampleInputEmail1"
                      placeholder="Username or Email"
                    />
                  </div>
                  <div class="col-12">
                    <div class="password-box">
                      <input
                        type="password"
                        class="form-control two password"
                        id="exampleInputPassword1"
                        placeholder="Password"
                      />
                      <i class="password-icon fa-regular fa-eye"></i>
                    </div>
                  </div>
                  <div class="col-12">
                    <div
                      class="form-check d-flex justify-content-between flex-wrap gap-2"
                    >
                      <div class="check">
                        <input
                          type="checkbox"
                          class="form-check-input"
                          id="exampleCheck1"
                        />
                        <label class="form-check-label" for="exampleCheck1"
                          >Remember me</label
                        >
                      </div>
                      <div class="forgot highlight">
                        <a href="">Forgot password?</a>
                      </div>
                    </div>
                  </div>
                </div>
                <button type="button" class="cmn-btn w-100 mt-30">
                  <div class="btn-wrapper">
                    <div class="main-text btn-single">Log In</div>
                    <div class="hover-text btn-single">Log In</div>
                  </div>
                </button>

                <div class="pt-30 text-center">
                  Don't have an account?
                  <a href="register.html" class="highlight">
                    Create an account</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- login-signup section end -->

    <!-- Jquery Js link -->
    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap Js link -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- Owl carausel Js link -->
    <script src="assets/js/owl.carousel.min.js"></script>
    <!-- select2 Js link -->
    <script src="assets/js/select2.min.js"></script>
    <!-- nice-select Js link -->
    <script src="assets/js/jquery.nice-select.min.js"></script>
    <!-- gsap Js link -->
   <script src="assets/js/gasp/plugin.js"></script>
    
    <!-- Main Js link -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
